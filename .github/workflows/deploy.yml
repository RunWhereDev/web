name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "public/**"
      - "shared/**"
      - "functions/**"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.mjs"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run validate:content
      - run: npm run lint
      - run: npm run test
      - run: npm run build
        env:
          PUBLIC_SITE_URL: https://runwhere.dev
          PUBLIC_GA4_MEASUREMENT_ID: ${{ vars.PUBLIC_GA4_MEASUREMENT_ID || secrets.PUBLIC_GA4_MEASUREMENT_ID || 'G-W74KZ9XQP8' }}
      - run: npm run sync:functions-data
      - run: npm install --prefix functions
      - run: npm run build --prefix functions
      - name: Deploy Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          projectId: runwhere-web
          channelId: live
