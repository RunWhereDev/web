name: Refresh pricing

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run refresh:pricing
      - run: npm run build:artifacts
      - run: npm run build:manifest
